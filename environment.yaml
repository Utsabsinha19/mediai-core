name: healthcare_ml
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pytorch=2.0.1
  - torchvision=0.15.2
  - cpuonly
  - scikit-learn=1.2.2
  - xgboost=1.7.6
  - lightgbm=3.3.5
  - numpy=1.23.5
  - pandas=1.5.3
  - opencv=4.7.0
  - pillow=9.5.0
  - matplotlib=3.7.1
  - seaborn=0.12.2
  - tqdm=4.65.0
  - joblib=1.2.0
  - pip
  - pip:
    - albumentations==1.3.0
    - optuna==3.2.0
    - shap==0.41.0
    - transformers==4.30.2
    - datasets==2.12.0
    - huggingface-hub==0.16.4